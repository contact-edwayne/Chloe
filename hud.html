function buildParticles() {
  const group = new THREE.Group();

  // Inner orbit — bright tracers
  const N1 = 120;
  const inner = new THREE.BufferGeometry();
  const innerPos = new Float32Array(N1 * 3);
  const innerData = new Float32Array(N1 * 4);
  const innerSize = new Float32Array(N1);
  for (let i = 0; i < N1; i++) {
    const r = 1.4 + Math.random() * 1.0;
    const theta0 = Math.random() * Math.PI * 2;
    const phi0 = (Math.random() - 0.5) * 0.6;
    const speed = 0.15 + Math.random() * 0.4;
    innerData.set([r, theta0, phi0, speed], i * 4);
    innerSize[i] = 0.2 + Math.random() * 0.6;
  }
  inner.setAttribute('position', new THREE.BufferAttribute(innerPos, 3));
  inner.setAttribute('aData', new THREE.BufferAttribute(innerData, 4));
  inner.setAttribute('aSize', new THREE.BufferAttribute(innerSize, 1));

  const innerMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x88ddff) },
      uPxRatio: { value: window.devicePixelRatio || 1 },
    },
    vertexShader: `
      attribute vec4 aData;
      attribute float aSize;
      uniform float uTime;
      uniform float uPxRatio;
      varying float vAlpha;
      void main() {
        float r = aData.x;
        float theta = aData.y + uTime * aData.w;
        float phi = aData.z + sin(uTime * 0.3 + aData.y) * 0.15;
        vec3 p;
        p.x = r * cos(theta) * cos(phi);
        p.y = r * sin(phi);
        p.z = r * sin(theta) * cos(phi);
        vAlpha = 0.6 + 0.4 * sin(uTime * 2.0 + aData.y * 5.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPxRatio * (180.0 / -mv.z);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float core = smoothstep(0.5, 0.0, d);
        float halo = smoothstep(0.5, 0.1, d);
        vec3 col = uColor * (core * 1.5 + halo * 0.5);
        gl_FragColor = vec4(col, halo * vAlpha);
      }
    `,
  });
  const innerPoints = new THREE.Points(inner, innerMat);
  group.add(innerPoints);

  // Outer dust
  const N2 = 800;
  const outer = new THREE.BufferGeometry();
  const outerPos = new Float32Array(N2 * 3);
  const outerSize = new Float32Array(N2);
  const outerSeed = new Float32Array(N2);
  for (let i = 0; i < N2; i++) {
    const r = 2.0 + Math.random() * 4.0;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * Math.PI;
    outerPos[i*3]   = r * Math.cos(theta) * Math.cos(phi);
    outerPos[i*3+1] = r * Math.sin(phi);
    outerPos[i*3+2] = r * Math.sin(theta) * Math.cos(phi);
    outerSize[i] = 0.3 + Math.random() * 0.6;
    outerSeed[i] = Math.random() * 100;
  }
  outer.setAttribute('position', new THREE.BufferAttribute(outerPos, 3));
  outer.setAttribute('aSize', new THREE.BufferAttribute(outerSize, 1));
  outer.setAttribute('aSeed', new THREE.BufferAttribute(outerSeed, 1));

  const outerMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x4488cc) },
      uPxRatio: { value: window.devicePixelRatio || 1 },
    },
    vertexShader: `
      attribute float aSize;
      attribute float aSeed;
      uniform float uTime;
      uniform float uPxRatio;
      varying float vAlpha;
      void main() {
        vec3 p = position;
        p.x += sin(uTime * 0.15 + aSeed) * 0.08;
        p.y += cos(uTime * 0.12 + aSeed * 1.3) * 0.08;
        p.z += sin(uTime * 0.10 + aSeed * 2.1) * 0.08;
        vAlpha = 0.3 + 0.4 * sin(uTime * 0.5 + aSeed * 3.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPxRatio * (160.0 / -mv.z);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float halo = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(uColor * halo, halo * vAlpha * 0.5);
      }
    `,
  });
  const outerPoints = new THREE.Points(outer, outerMat);
  group.add(outerPoints);

  // Data ring
  const ringGeo = new THREE.RingGeometry(1.55, 1.62, 128);
  const ringMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x66bbff) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uColor;
      varying vec2 vUv;
      void main() {
        float a = atan(vUv.y - 0.5, vUv.x - 0.5);
        float dash = step(0.6, sin(a * 60.0 + uTime * 1.5));
        float pulse = step(0.7, sin(a * 6.0 - uTime * 2.0));
        float alpha = (dash * 0.4 + pulse * 0.8);
        gl_FragColor = vec4(uColor * (0.6 + pulse), alpha);
      }
    `,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI * 0.42;
  ring.position.y = -0.05;
  group.add(ring);

  const ring2 = new THREE.Mesh(
    new THREE.RingGeometry(1.95, 1.99, 128),
    ringMat.clone()
  );
  ring2.material.uniforms = {
    uTime: ringMat.uniforms.uTime,
    uColor: { value: new THREE.Color(0x3388cc) },
  };
  ring2.rotation.x = Math.PI * 0.55;
  ring2.rotation.z = Math.PI * 0.3;
  group.add(ring2);

  return {
    group,
    update({ t }) {
      innerMat.uniforms.uTime.value = t;
      outerMat.uniforms.uTime.value = t;
      ringMat.uniforms.uTime.value = t;
      ring.rotation.z = t * 0.05;
      ring2.rotation.y = -t * 0.03;
    },
  };
}

// ════════════════════════════════════════════════════════════════════════════
// SCENE SETUP — confined to the .avatar-face container
// ════════════════════════════════════════════════════════════════════════════
const container = document.getElementById('scene');
function getSize() {
  const r = container.getBoundingClientRect();
  return { w: r.width || 200, h: r.height || 200 };
}
let { w, h } = getSize();

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(w, h);
renderer.setClearColor(0x000000, 0);  // transparent — let CSS gradient show through
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000308, 0.015);

const camera = new THREE.PerspectiveCamera(28, w / h, 0.1, 100);
camera.position.set(0, 0, 5.4);
camera.lookAt(0, 0, 0);

const avatar = new THREE.Group();
scene.add(avatar);

const orb = buildOrb();
avatar.add(orb.group);

const particles = buildParticles();
scene.add(particles.group);

// Halo behind orb
const haloGeo = new THREE.PlaneGeometry(7, 7);
const haloMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uAmp:  { value: 0 },
    uColor: { value: new THREE.Color(0x3399ff) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime; uniform vec3 uColor; uniform float uAmp;
    varying vec2 vUv;
    void main() {
      vec2 p = vUv - 0.5;
      float d = length(p);
      float glow = smoothstep(0.5, 0.05, d);
      glow = pow(glow, 2.0);
      float pulse = 0.7 + 0.3 * sin(uTime * 0.7) + uAmp * 0.6;
      gl_FragColor = vec4(uColor * glow * pulse * 0.30, glow * 0.30);
    }
  `,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.z = -1.4;
scene.add(halo);

// Postprocessing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(w, h), 0.55, 0.5, 0.55);
composer.addPass(bloom);
const chromaScan = new ShaderPass(ChromaScanlinePass);
composer.addPass(chromaScan);
composer.addPass(new OutputPass());

// ════════════════════════════════════════════════════════════════════════════
// AMPLITUDE SIMULATION — drives orb visuals based on current state
// ════════════════════════════════════════════════════════════════════════════
function hashN(n) { return Math.abs(Math.sin(n * 12.9898) * 43758.5453) % 1; }
function pnoise(t) {
  const i = Math.floor(t), f = t - i;
  const a = hashN(i), b = hashN(i + 1);
  const u = f * f * (3 - 2 * f);
  return a * (1 - u) + b * u;
}
let amp = 0;
let speakSyllable = 0, nextSyllable = 0;
function updateAmp(t, dt, state) {
  let target = 0;
  if (state === 'idle') {
    target = 0.10 + Math.sin(t * 0.9) * 0.05 + pnoise(t * 0.6) * 0.06;
  } else if (state === 'listening') {
    target = 0.20 + pnoise(t * 1.2) * 0.35 + pnoise(t * 3.7) * 0.12;
  } else if (state === 'thinking') {
    target = 0.35 + pnoise(t * 2.3) * 0.25 + pnoise(t * 5.1) * 0.10;
  } else if (state === 'speaking') {
    // Prefer real audio amplitude from the AnalyserNode when in-browser TTS
    // is playing — orb pulses then match the audio frame-perfect because
    // they share the same source. Falls back to synthetic syllables if we're
    // displaying 'speaking' from a backend-only path (e.g. wake-word loop).
    const realAmp = (typeof window !== 'undefined' && window.TtsAudio)
                    ? window.TtsAudio.getAmp() : null;
    if (realAmp !== null) {
      // Light noise floor so the orb has a hint of life on quiet phonemes.
      target = 0.20 + realAmp * 0.85 + pnoise(t * 8) * 0.04;
    } else {
      speakSyllable -= dt;
      if (speakSyllable <= 0) {
        nextSyllable = 0.85 + Math.random() * 0.5;
        speakSyllable = 0.08 + Math.random() * 0.20;
      }
      const env = Math.max(0, Math.sin((1 - speakSyllable / 0.28) * Math.PI));
      target = 0.20 + env * nextSyllable + pnoise(t * 8) * 0.08;
    }
  }
  amp += (target - amp) * 0.18;
  amp = Math.max(0, Math.min(1, amp));
}

// ════════════════════════════════════════════════════════════════════════════
// ANIMATE
// ════════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  const state = window.__chloeState || 'idle';
  updateAmp(t, dt, state);

  const baseSpin = state === 'thinking' ? 0.35 : state === 'speaking' ? 0.15 : 0.08;
  avatar.rotation.y += dt * baseSpin;

  const breathe = 1.0 + amp * 0.04;
  avatar.scale.setScalar(breathe);

  orb.update({ t, dt, state, amp });
  particles.update({ t, dt, state, amp });

  haloMat.uniforms.uTime.value = t;
  haloMat.uniforms.uAmp.value = amp;
  chromaScan.uniforms.uTime.value = t;

  composer.render();
  requestAnimationFrame(animate);
}

// Hide loader once first frame is rendered
requestAnimationFrame(() => {
  const l = document.getElementById('orb-loader');
  if (l) {
    l.classList.add('hidden');
    setTimeout(() => l.remove(), 600);
  }
  animate();
});

// Resize observer — keep orb sized to the ring container
const ro = new ResizeObserver(() => {
  const s = getSize();
  if (s.w === 0 || s.h === 0) return;
  renderer.setSize(s.w, s.h);
  composer.setSize(s.w, s.h);
  bloom.setSize(s.w, s.h);
  camera.aspect = s.w / s.h;
  camera.updateProjectionMatrix();
});
ro.observe(container);

// Init state
window.setState('idle');
</script>

  <style id="brain-graph-styles">
    .brain-btn {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--cyan);
      font: inherit;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .brain-btn:hover {
      background: rgba(0, 247, 255, 0.08);
      border-color: var(--cyan);
    }
    .brain-btn.on {
      background: rgba(168, 85, 247, 0.18);
      border-color: #a855f7;
      color: #d8b4ff;
    }
    #brain-graph-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: none;
    }
    #brain-graph-overlay.on { display: block; }
    #brain-graph-overlay iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    #brain-graph-close {
      position: absolute;
      top: 10px; right: 14px;
      z-index: 10001;
      background: var(--panel);
      border: 1px solid var(--border2);
      color: var(--cyan);
      font: inherit;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    #brain-graph-close:hover { border-color: var(--cyan); }
  </style>
  <div id="brain-graph-overlay">
    <button id="brain-graph-close" onclick="toggleBrainGraph(false)">CLOSE [Esc]</button>
    <iframe id="brain-graph-iframe" title="Chloe Brain Graph"></iframe>
  </div>
  <script>
    function toggleBrainGraph(force) {
      const ov = document.getElementById('brain-graph-overlay');
      const btn = document.getElementById('brain-btn');
      const f = document.getElementById('brain-graph-iframe');
      const willOpen = (force === undefined) ? !ov.classList.contains('on') : !!force;
      if (willOpen) {
        // CRITICAL: show the overlay FIRST so the iframe has real dimensions
        // when its page loads. Otherwise vis-network creates its canvas at
        // 0x0 inside a display:none parent and never re-fits when shown.
        ov.classList.add('on');
        if (btn) btn.classList.add('on');
        let host = (window.location.hostname && window.location.hostname !== '')
          ? window.location.hostname : 'localhost';
        const port = 6790;
        const src = `http://${host}:${port}/brain-graph.html?t=${Date.now()}`;
        // Tiny defer so layout has flushed before the iframe starts loading.
        setTimeout(() => { f.src = src; }, 30);
      } else {
        ov.classList.remove('on');
        if (btn) btn.classList.remove('on');
        // Free the iframe so a re-open does a fresh fetch
        f.src = 'about:blank';
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('brain-graph-overlay').classList.contains('on')) {
        toggleBrainGraph(false);
      }
    });
  </script>
  <!-- END BRAIN GRAPH OVERLAY -->
