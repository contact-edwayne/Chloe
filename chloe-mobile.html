<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!--
  Chloe — mobile PWA client.

  Single-file client that pairs with the existing jarvis.py WebSocket backend
  on the home PC. Works on iOS Safari (add to Home Screen), Android Chrome,
  and desktop browsers.

  Reaching the backend:
    - Backend binds 0.0.0.0:6789 (CHLOE_WS_HOST=0.0.0.0; default since the
      mobile PR).
    - Phone reaches the PC over Tailscale by Tailscale IP or MagicDNS name.
    - Page must be served over HTTPS for getUserMedia to work on Safari.
      (`tailscale serve --bg --https=443 ...` or self-signed + accept.)

  Wire protocol (matches jarvis.py exactly — see hud.html for the desktop
  equivalent):
    HUD → backend  : {type:"chat",      messages, system, max_tokens}
                     {type:"ptt_audio", wav_b64}      ← mobile-only
    backend → HUD  : {type:"start"}, {type:"delta", text}, {type:"done"}
                     {type:"error", text}
                     {type:"voice_exchange", user, assistant}
                     plain string state: idle | listening | thinking | speaking

  Mic path (PTT only — no wake word on mobile by design):
    AudioWorklet captures Float32 frames at the AudioContext rate (typically
    44.1k or 48k on iOS), we resample to 16kHz, encode mono int16 WAV in JS,
    base64, send. Server-side `wave` decodes and runs the existing
    Whisper → Groq → TTS pipeline.
-->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chloe">
<meta name="theme-color" content="#000810">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="chloe_icon.png">
<title>Chloe</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<!-- Three.js import map for the 3D galaxy orb (matches desktop hud.html so
     the same shaders / scene / animation code works unchanged). -->
<script type="importmap">
{
  "imports": {
    "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --cyan:    #00f7ff;
    --cyan-d:  #00f7ff44;
    --green:   #00ff88;
    --amber:   #ffaa00;
    --red:     #ff3355;
    --bg:      #000810;
    --panel:   #000d1a;
    --border:  #00f7ff2a;
    --border2: #00f7ff55;
  }

  html, body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    /* dvh = dynamic viewport height. On iOS this shrinks when the keyboard
       slides up so the controls don't get hidden behind it. Falls back to
       100% on older browsers (which is the static viewport). */
    height: 100dvh;
    min-height: 100%;
    overflow: hidden;
    /* Honor iOS safe areas (notch / home indicator) */
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Subtle backdrop matching the desktop HUD aesthetic */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 50% 20%, #00f7ff10 0%, transparent 60%),
      linear-gradient(rgba(0, 247, 255, 0.025) 1px, transparent 1px) 0 0 / 32px 32px,
      linear-gradient(90deg, rgba(0, 247, 255, 0.025) 1px, transparent 1px) 0 0 / 32px 32px,
      var(--bg);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100%;
    max-width: 720px; margin: 0 auto;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  header {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan-d);
  }
  .logo .sub {
    font-family: 'Share Tech Mono', monospace;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 2px;
    opacity: 0.6;
    margin-left: 6px;
  }
  .conn {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 1px;
    opacity: 0.85;
  }
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    transition: background 0.2s, box-shadow 0.2s;
  }
  .conn.up   .conn-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .conn.wait .conn-dot { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

  /* ── ORB ────────────────────────────────────────────────────────────── */
  /* The scene container hosts a Three.js canvas — full WebGL galaxy orb
     ported from the desktop HUD. Wrapped by .orb-frame which carries the
     decorative concentric rings (cockpit chrome). */
  .orb-wrap {
    flex: 0 0 auto;
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 0 2px;
  }
  /* The frame holds room for the outer rings without affecting the
     canvas itself (canvas size is driven by .scene only). */
  .orb-frame {
    position: relative;
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
  }
  /* Inner disc that crops the WebGL canvas to a circle and carries the
     cyan border + glow. Sized smaller than the frame so the rings sit
     around it. */
  .scene {
    width: 168px; height: 168px;
    position: relative;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--border2);
    background: radial-gradient(circle at 50% 50%,
      rgba(0, 247, 255, 0.06) 0%,
      transparent 60%);
    box-shadow:
      0 0 28px var(--cyan-d),
      inset 0 0 22px rgba(0, 247, 255, 0.12);
    z-index: 2;
  }
  .scene canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
  /* Outer concentric rings, layered around the disc to give the orb a
     "HUD instrument" feel. Each one rotates independently. */
  .ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    box-sizing: border-box;
  }
  /* Ring 1: thin dashed circle just outside the disc (radar sweep). */
  .ring-1 {
    inset: 8px;
    border: 1px dashed rgba(0, 247, 255, 0.30);
    animation: ring-spin-cw 16s linear infinite;
  }
  /* Ring 2: solid faint circle slightly further out, with tick marks
     drawn via conic-gradient. */
  .ring-2 {
    inset: 0;
    border: 1px solid rgba(0, 247, 255, 0.20);
    background:
      conic-gradient(
        from 0deg,
        transparent 0deg,        rgba(0, 247, 255, 0.55) 1deg,
        transparent 2deg,        transparent 30deg,
        rgba(0, 247, 255, 0.35) 31deg, transparent 32deg,
        transparent 60deg,       rgba(0, 247, 255, 0.55) 61deg,
        transparent 62deg,       transparent 90deg,
        rgba(0, 247, 255, 0.35) 91deg, transparent 92deg,
        transparent 120deg,      rgba(0, 247, 255, 0.55) 121deg,
        transparent 122deg,      transparent 150deg,
        rgba(0, 247, 255, 0.35) 151deg, transparent 152deg,
        transparent 180deg,      rgba(0, 247, 255, 0.55) 181deg,
        transparent 182deg,      transparent 210deg,
        rgba(0, 247, 255, 0.35) 211deg, transparent 212deg,
        transparent 240deg,      rgba(0, 247, 255, 0.55) 241deg,
        transparent 242deg,      transparent 270deg,
        rgba(0, 247, 255, 0.35) 271deg, transparent 272deg,
        transparent 300deg,      rgba(0, 247, 255, 0.55) 301deg,
        transparent 302deg,      transparent 330deg,
        rgba(0, 247, 255, 0.35) 331deg, transparent 332deg,
        transparent 360deg);
    /* Mask the conic-gradient to a thin annular ring so it only paints
       at the outer edge (the tick marks). */
    -webkit-mask: radial-gradient(circle, transparent 56%, black 58%, black 62%, transparent 64%);
            mask: radial-gradient(circle, transparent 56%, black 58%, black 62%, transparent 64%);
    animation: ring-spin-ccw 32s linear infinite;
  }
  /* Ring 3: outermost faint dotted circle, slow rotation opposite Ring 1. */
  .ring-3 {
    inset: -8px;
    border: 1px dotted rgba(0, 247, 255, 0.22);
    animation: ring-spin-ccw 48s linear infinite;
  }
  /* Sweep light — a single bright dot orbiting the disc. */
  .sweep {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: ring-spin-cw 6s linear infinite;
  }
  .sweep::after {
    content: '';
    position: absolute;
    top: -3px; left: 50%;
    width: 6px; height: 6px;
    margin-left: -3px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-d);
  }
  /* Ambient glow halo behind the whole frame — pulses subtly with breathing. */
  .orb-frame::before {
    content: '';
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(0, 247, 255, 0.10) 0%,
      transparent 70%);
    pointer-events: none;
    animation: orb-breathe 6s ease-in-out infinite;
  }
  @keyframes ring-spin-cw  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
  @keyframes ring-spin-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg);    } }
  @keyframes orb-breathe   {
    0%, 100% { opacity: 0.7; transform: scale(1);    }
    50%      { opacity: 1.0; transform: scale(1.06); }
  }
  /* While Three.js initializes (loading shaders / first frame), show a
     tiny pulsing dot so the area doesn't look broken. */
  .orb-loader {
    position: absolute; inset: 50%;
    width: 12px; height: 12px;
    margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
    animation: orb-loader-pulse 1.2s ease-in-out infinite;
    transition: opacity 0.5s;
  }
  .orb-loader.hidden { opacity: 0; pointer-events: none; }
  @keyframes orb-loader-pulse {
    0%, 100% { transform: scale(1);   opacity: 0.7; }
    50%      { transform: scale(1.6); opacity: 0.2; }
  }

  .state-label {
    margin-top: 6px;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ── CHAT LOG ───────────────────────────────────────────────────────── */
  .chatlog {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 14px 14px 18px;
    -webkit-overflow-scrolling: touch;
    /* Subtle top divider to separate orb area from chat — the orb sits
       on a different visual plane than the conversation. */
    border-top: 1px solid var(--border);
    margin-top: 6px;
    /* Minimum visible chat area so the most recent reply isn't clipped
       behind the controls when only one or two messages are visible. */
    min-height: 140px;
  }
  .msg {
    display: flex; gap: 8px;
    margin-bottom: 10px;
  }
  .msg.me      { flex-direction: row-reverse; }
  .msg-avatar {
    flex: 0 0 26px;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700;
    background: var(--panel);
  }
  .msg.me .msg-avatar    { color: var(--green);  border-color: #00ff8855; }
  .msg.chloe .msg-avatar { color: var(--cyan);   border-color: var(--border2); }
  .msg-bubble {
    max-width: 78%;
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg.me .msg-bubble    { border-color: #00ff8833; background: #001a14; color: #d8ffe8; }
  .msg.chloe .msg-bubble { color: #d8f6ff; }
  .msg-bubble.error      { color: var(--red); border-color: #ff335555; }

  /* ── CONTROLS ───────────────────────────────────────────────────────── */
  /* Sits at the bottom; padding tuned to keep PTT visible above the home
     indicator on iPhone. Tighter than before so the button isn't pushed
     past the bottom safe area. The body already applies
     env(safe-area-inset-bottom) so we don't need to double-up here. */
  .controls {
    flex: 0 0 auto;
    border-top: 1px solid var(--border);
    padding: 10px 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
    background: linear-gradient(180deg, transparent 0%, #00050c 50%);
  }
  .text-row {
    display: flex; gap: 8px;
  }
  .text-row input {
    flex: 1; min-width: 0;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--cyan);
    font-family: inherit; font-size: 14px;
    padding: 10px 12px;
    outline: none;
  }
  .text-row input:focus { border-color: var(--cyan); }
  .text-row button {
    flex: 0 0 auto;
    background: var(--cyan); color: #001520;
    border: none; border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    padding: 0 14px;
    cursor: pointer;
  }
  .text-row button:disabled { opacity: 0.4; cursor: not-allowed; }

  .ptt-btn {
    width: 100%;
    height: 72px;
    background: linear-gradient(180deg, #001a26 0%, #000d14 100%);
    border: 2px solid var(--border2);
    border-radius: 12px;
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 16px; font-weight: 700; letter-spacing: 4px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: all 0.1s;
    /* iOS: prevent the long-press magnifier and callout */
    -webkit-touch-callout: none;
  }
  .ptt-btn:active,
  .ptt-btn.holding {
    background: linear-gradient(180deg, #00ff88 0%, #00aa55 100%);
    color: #000810;
    border-color: var(--green);
    box-shadow: 0 0 20px var(--green);
    transform: scale(0.98);
  }
  .ptt-hint {
    text-align: center;
    font-size: 10px;
    opacity: 0.5;
    letter-spacing: 1px;
  }

  /* ── EMPTY STATE ────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 30px 20px;
    opacity: 0.5;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── SPLASH SCREEN ──────────────────────────────────────────────────── */
  /* Ported from the desktop HUD. Sized down for phone viewport. iOS won't
     autoplay audio, so the splash is tap-to-enter on first launch — same
     ceremonial feel as the desktop boot, just user-initiated. The loading
     bar fills in lockstep with the boot.mp3 duration, then the hologram
     shutdown exit animation runs and reveals the app. */
  .splash {
    position: fixed;
    inset: 0;
    z-index: 10000;
    background: radial-gradient(circle at center,
                  #001020 0%, #000408 70%, #000000 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    /* Tappable initially — iOS audio gating means the user starts the boot. */
    pointer-events: auto;
    transition: opacity 0.7s ease-out;
    opacity: 1;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .splash.hidden { opacity: 0; pointer-events: none; }
  /* Subtle moving scanline texture */
  .splash::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0,
        transparent 3px,
        rgba(0, 247, 255, 0.04) 3px,
        rgba(0, 247, 255, 0.04) 4px);
    pointer-events: none;
    animation: splash-scan 12s linear infinite;
  }
  /* Outer glow ring at the center */
  .splash::after {
    content: '';
    position: absolute;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle,
                  rgba(0, 247, 255, 0.10) 0%,
                  rgba(0, 247, 255, 0.04) 40%,
                  transparent 70%);
    animation: splash-glow 4s ease-in-out infinite;
    pointer-events: none;
  }
  .splash-content {
    position: relative;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    z-index: 1;
    padding: 0 16px;
  }
  .splash-title {
    font-size: 52px;
    font-weight: 800;
    letter-spacing: 14px;
    color: var(--cyan);
    margin: 0 0 10px 14px;
    text-shadow:
      0 0 16px var(--cyan),
      0 0 36px var(--cyan),
      0 0 60px rgba(0, 247, 255, 0.5);
    animation: splash-title-pulse 2.4s ease-in-out infinite;
  }
  .splash-subtitle {
    font-size: 11px;
    letter-spacing: 7px;
    color: var(--green);
    margin: 0 0 28px 7px;
    opacity: 0.85;
    text-shadow: 0 0 8px var(--green);
  }
  .splash-loading {
    width: 240px;
    height: 3px;
    background: rgba(0, 247, 255, 0.12);
    border-radius: 2px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow:
      0 0 8px rgba(0, 247, 255, 0.3),
      inset 0 0 4px rgba(0, 0, 0, 0.6);
  }
  .splash-loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, var(--cyan), var(--green));
    box-shadow: 0 0 12px var(--cyan);
    transition: width 4500ms linear;
  }
  .splash-status {
    margin-top: 18px;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(0, 247, 255, 0.55);
    min-height: 14px;
    /* Slow blink so "TAP TO BEGIN" feels alive and inviting */
    animation: splash-status-blink 1.8s ease-in-out infinite;
  }
  /* Stop the blink once boot is in progress (set by JS via class) */
  .splash-status.booting { animation: none; }

  @keyframes splash-title-pulse {
    0%, 100% {
      text-shadow:
        0 0 16px var(--cyan),
        0 0 36px var(--cyan),
        0 0 60px rgba(0, 247, 255, 0.5);
    }
    50% {
      text-shadow:
        0 0 24px var(--cyan),
        0 0 50px var(--cyan),
        0 0 90px rgba(0, 247, 255, 0.7);
    }
  }
  @keyframes splash-scan {
    0%   { transform: translateY(0); }
    100% { transform: translateY(100px); }
  }
  @keyframes splash-glow {
    0%, 100% { transform: scale(0.9); opacity: 0.7; }
    50%      { transform: scale(1.1); opacity: 1.0; }
  }
  @keyframes splash-status-blink {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1.0; }
  }

  /* ─── Splash EXIT — "Hologram shutdown" — ported from desktop verbatim.
     Lock-in flash → vertical compress → glitch jitter → horizontal stretch
     → fade. Synced to the boot-sound duration so the visual finishes with
     the audio. */
  .splash.exiting {
    pointer-events: none;
    animation: splash-exit-bg 1100ms cubic-bezier(0.55, 0, 0.4, 1) forwards;
  }
  .splash.exiting .splash-content {
    animation: splash-exit-shutdown 1000ms cubic-bezier(0.7, 0, 0.3, 1) forwards;
    transform-origin: center center;
    will-change: transform, opacity, filter;
  }
  .splash.exiting::before {
    animation: splash-exit-scanflare 1100ms ease-out forwards;
  }
  .splash.exiting::after {
    animation: splash-exit-ringfade 1100ms cubic-bezier(0.55, 0, 0.2, 1) forwards;
  }
  @keyframes splash-exit-bg {
    0%   { opacity: 1; }
    11%  { opacity: 1; filter: brightness(1.25); }
    25%  { opacity: 1; filter: brightness(1); }
    70%  { opacity: 0.55; }
    100% { opacity: 0; }
  }
  @keyframes splash-exit-shutdown {
    0%   { transform: scaleY(1) scaleX(1) translateX(0); opacity: 1; filter: brightness(1) saturate(1); }
    12%  { transform: scaleY(1.04) scaleX(1.03);         opacity: 1; filter: brightness(2.3) saturate(1.3); }
    30%  { transform: scaleY(0.06) scaleX(1.08);         opacity: 1; filter: brightness(1.9) saturate(1.1); }
    42%  { transform: scaleY(0.06) scaleX(1.08) translateX(11px);  filter: brightness(2.0) hue-rotate(8deg);  }
    48%  { transform: scaleY(0.06) scaleX(1.08) translateX(-15px); filter: brightness(1.6) hue-rotate(-10deg); }
    55%  { transform: scaleY(0.06) scaleX(1.08) translateX(0);     filter: brightness(1.8) hue-rotate(0); }
    78%  { transform: scaleY(0.04) scaleX(1.55);         opacity: 0.55; filter: brightness(1.2); }
    100% { transform: scaleY(0)    scaleX(1.8);          opacity: 0;    filter: brightness(0.4); }
  }
  @keyframes splash-exit-scanflare {
    0%   { opacity: 1; filter: brightness(1); }
    11%  { opacity: 1; filter: brightness(3); }
    35%  { opacity: 1; filter: brightness(1.4); }
    100% { opacity: 0; }
  }
  @keyframes splash-exit-ringfade {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(0.7); opacity: 0.5; }
    100% { transform: scale(0.4); opacity: 0; }
  }

  /* ── WALLET ─────────────────────────────────────────────────────────── */
  .wallet-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .wallet-btn:hover, .wallet-btn:active {
    background: rgba(255, 170, 0, 0.08);
    border-color: var(--amber);
  }
  .wallet-sheet {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wallet-sheet.active { display: flex; }
  .wallet-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .wallet-title {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    color: var(--amber);
    letter-spacing: 3px;
  }
  .wallet-close {
    background: transparent; border: none;
