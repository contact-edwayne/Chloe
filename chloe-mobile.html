<script>
// ─────────────────────────────────────────────────────────────────────────────
// SPLASH SCREEN — ported from desktop HUD with iOS-friendly tap-to-enter.
// ─────────────────────────────────────────────────────────────────────────────
// iOS Safari blocks autoplay until a user gesture. Rather than try and fail,
// we present a "TAP TO BEGIN" splash. On tap (which IS a gesture) we play
// boot.mp3 and run the loading bar + hologram-shutdown exit synced to the
// audio's actual duration. Fallback: if audio fails for any reason, splash
// still exits after a fixed timeout so the user isn't stuck.
const splash = {
  el:     () => document.getElementById('splash-screen'),
  bar:    () => document.getElementById('splash-bar'),
  status: () => document.getElementById('splash-status'),
  audio:  null,
  _hidden: false,
  _started: false,

  init() {
    // Pre-load the boot audio so its `duration` is known by the time the
    // user taps. Safari may not actually fetch until play() but preload='auto'
    // is the right hint.
    this.audio = new Audio('sounds/boot.mp3');
    this.audio.preload = 'auto';
    // First tap anywhere on the splash starts the sequence.
    const start = () => this.start();
    const e = this.el();
    e.addEventListener('click',    start, { once: true });
    e.addEventListener('touchend', start, { once: true });
  },

  start() {
    if (this._started) return;
    this._started = true;
    this.setStatus('BOOTING');
    const statusEl = this.status();
    if (statusEl) statusEl.classList.add('booting');

    // Play the audio. play() is allowed here because we're in a click/touch
    // gesture handler. On rejection (rare — usually a missing/blocked file)
    // we still run the visual sequence so the splash doesn't strand.
    let durationS = 4;  // sensible default if audio metadata isn't loaded yet
    const a = this.audio;
    if (a) {
      try {
        const playPromise = a.play();
        if (playPromise && playPromise.catch) {
          playPromise.catch((e) => console.warn('[splash] audio play rejected', e));
        }
      } catch (e) {
        console.warn('[splash] audio play threw', e);
      }
      // If metadata's loaded we have a real duration; otherwise the default
      // is fine (boot.mp3 is ~4.5s per the handoff).
      if (!isNaN(a.duration) && a.duration > 0) durationS = a.duration;
    }

    // Sync the loading bar with the audio
    const ms  = Math.max(500, Math.round(durationS * 1000));
    const bar = this.bar();
    if (bar) {
      bar.style.transition = 'none';
      bar.style.width = '0%';
      void bar.offsetWidth;  // force layout so the next style change animates
      bar.style.transition = `width ${ms}ms linear`;
      bar.style.width = '100%';
    }

    // Schedule the hide just after audio finishes (200ms cushion so the
    // ceremonial exit lines up with the last sound frame).
    setTimeout(() => this.hide(), ms + 200);

    // We're in a user gesture — pre-unlock the reply audio element so the
    // first TTS reply plays through cleanly without iOS autoplay friction.
    // (unlockReplyAudio is defined further down in this script.)
    try {
      if (typeof unlockReplyAudio === 'function') unlockReplyAudio();
    } catch (e) {
      console.warn('[splash] reply audio unlock failed', e);
    }
  },

  setStatus(text) {
    const s = this.status();
    if (s) s.textContent = text;
  },

  hide() {
    if (this._hidden) return;
    this._hidden = true;
    const e = this.el();
    if (!e) return;
    // Stage 1: hologram-shutdown animation (1100ms)
    e.classList.add('exiting');
    // Stage 2: remove from layout so it can't intercept clicks afterwards
    setTimeout(() => {
      e.classList.add('hidden');
      e.style.display = 'none';
    }, 1100);
  },
};
splash.init();
// Safety: if user walks away and never taps, fade after 60s rather than
// keeping the splash up forever.
setTimeout(() => { if (!splash._started) splash.hide(); }, 60000);

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
// WebSocket URL resolution:
//   - Override via ?ws=ws://hostname:port in the URL (handy for dev).
//   - If the page is loaded over HTTPS (the production iPhone path), we use
//     wss:// on the same origin at path /chloe-ws — the browser's mixed-
//     content rules block plain ws:// from an HTTPS page, so the WS HAS to
//     be reverse-proxied through HTTPS too. See MOBILE_SETUP.md for the
//     `tailscale serve` recipe that does this.
//   - On plain HTTP (desktop dev test on localhost) we hit port 6789 directly.
const WS_URL = (() => {
  const u = new URLSearchParams(location.search).get('ws');
  if (u) return u;
  if (location.protocol === 'https:') {
    return `wss://${location.host}/chloe-ws`;
  }
  return `ws://${location.hostname || 'localhost'}:6789`;
})();

const TARGET_SR = 16000;  // backend SAMPLE_RATE — Whisper happy here

const CHAT_SYSTEM = (
  "You are Chloe, a personal home assistant. " +
  "Reply in plain spoken sentences only — no markdown, no lists, no headers. " +
  "Keep replies short, friendly, and conversational — usually one or two sentences."
);

// ─────────────────────────────────────────────────────────────────────────────
// DOM
// ─────────────────────────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const stateLabel  = $('state-label');
const chatlog     = $('chatlog');
const emptyEl     = $('empty');
const connEl      = $('conn');
const connText    = $('conn-text');
const inputEl     = $('chat-input');
const sendBtn     = $('send-btn');
const pttBtn      = $('ptt-btn');
const pttHint     = $('ptt-hint');

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let ws = null;
let wsReady = false;
let chatHistory = [];          // [{role, content}]
const HISTORY_MAX = 16;
let currentReplyEl = null;
let currentReplyText = '';
let busy = false;

let micGranted = false;
let audioCtx = null;
let workletNode = null;
let micStream = null;
let pcmBuffer = [];            // Array<Float32Array> at audioCtx.sampleRate
let recording = false;

// ─────────────────────────────────────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function setState(s) {
  stateLabel.textContent = s.toUpperCase();
  // The Three.js orb (loaded as a separate module below) reads
  // window.__jarvisState every frame to decide its animation/turbulence/
  // spin profile. We mirror to __chloeState so future code can prefer
  // the namespaced version too.
  window.__jarvisState = s;
  window.__chloeState  = s;
}
// Expose globally so the orb module can call into the same setState if
// it wants to (matches the desktop HUD's API surface).
window.setState = setState;

function setConn(status) {
  connEl.classList.remove('up', 'wait');
  if (status === 'up')   { connEl.classList.add('up');   connText.textContent = 'CONNECTED'; }
  if (status === 'wait') { connEl.classList.add('wait'); connText.textContent = 'CONNECTING'; }
  if (status === 'down') {                                connText.textContent = 'OFFLINE'; }
}

function appendMsg(who, text, opts = {}) {
  if (emptyEl) emptyEl.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + who;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = who === 'me' ? 'E' : 'C';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (opts.error ? ' error' : '');
  bubble.textContent = text;
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatlog.appendChild(wrap);
  chatlog.scrollTop = chatlog.scrollHeight;
  return wrap;
}

function trimHistory() {
  if (chatHistory.length > HISTORY_MAX) {
    chatHistory.splice(0, chatHistory.length - HISTORY_MAX);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// WEBSOCKET
// ─────────────────────────────────────────────────────────────────────────────
function connectWS() {
  setConn('wait');
  try {
    ws = new WebSocket(WS_URL);
  } catch (e) {
    console.error('[chloe] WS construct failed', e);
    scheduleReconnect();
    return;
  }
  ws.onopen = () => {
    wsReady = true;
    setConn('up');
    console.log('[chloe] connected to', WS_URL);
  };
  ws.onclose = () => {
    wsReady = false;
    setConn('down');
    console.log('[chloe] WS closed, reconnecting');
    scheduleReconnect();
  };
  ws.onerror = (e) => {
    console.warn('[chloe] WS error', e);
  };
  ws.onmessage = (ev) => {
    const raw = ev.data;
    let data = null;
    try { data = JSON.parse(raw); } catch (_) {}
    if (data && typeof data === 'object') return handleStructured(data);
    if (typeof raw === 'string') {
      const s = raw.trim().toLowerCase();
      if (['idle','listening','thinking','speaking'].includes(s)) setState(s);
    }
  };
}

let reconnectTimer = null;
function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectWS();
  }, 1500);
}

function handleStructured(data) {
  if (data.type === 'tool_start') {
    if (!currentReplyEl) currentReplyEl = appendMsg('chloe', '');
    currentReplyEl.querySelector('.msg-bubble').textContent = '🔎 ' + (data.text || 'Searching…');
  } else if (data.type === 'start') {
    if (!currentReplyEl) currentReplyEl = appendMsg('chloe', '');
    currentReplyEl.querySelector('.msg-bubble').textContent = '';
    currentReplyText = '';
    setState('thinking');
  } else if (data.type === 'delta') {
    currentReplyText += (data.text || '');
    if (currentReplyEl) {
      currentReplyEl.querySelector('.msg-bubble').textContent = currentReplyText;
      chatlog.scrollTop = chatlog.scrollHeight;
    }
  } else if (data.type === 'done') {
    const reply = currentReplyText.trim();
    if (reply) { chatHistory.push({ role: 'assistant', content: reply }); trimHistory(); }
    currentReplyEl = null;
    currentReplyText = '';
    busy = false;
    sendBtn.disabled = false;
  } else if (data.type === 'error') {
    console.error('[chloe] backend error:', data.text);
    if (currentReplyEl) {
      const b = currentReplyEl.querySelector('.msg-bubble');
      b.textContent = '[error] ' + (data.text || 'unknown');
      b.classList.add('error');
    } else {
      appendMsg('chloe', '[error] ' + (data.text || 'unknown'), { error: true });
    }
    currentReplyEl = null;
    currentReplyText = '';
    busy = false;
    sendBtn.disabled = false;
    setState('idle');
  } else if (data.type === 'voice_exchange') {
    // From the backend's voice path (desktop wake-word or another client's PTT)
    // — show it so all clients stay in sync.
    if (data.user)      { appendMsg('me',    '🎤 ' + data.user); chatHistory.push({ role: 'user',      content: data.user }); }
    if (data.assistant) { appendMsg('chloe', data.assistant);    chatHistory.push({ role: 'assistant', content: data.assistant }); }
    trimHistory();
  } else if (data.type === 'reply' && data.text) {
    appendMsg('chloe', data.text);
    busy = false;
    sendBtn.disabled = false;
    setState('idle');
  } else if (data.type === 'ptt_too_short') {
    pttHint.textContent = 'too short — try holding longer';
    setTimeout(() => { pttHint.textContent = 'hold to talk'; }, 2000);
    setState('idle');
  } else if (data.type === 'tts_audio') {
    // Backend synthesized Chloe's reply and is streaming the audio bytes
    // back so we can play them in the browser — no echo through the PC
    // speakers. The format is "mp3" (ElevenLabs/edge-tts) or "wav"
    // (Kokoro). Both are playable directly via a data URL.
    playReplyAudio(data.audio_b64, data.format || 'mp3');
  } else if (data.type === 'wallet_balance_result') {
    onWalletBalanceResult(data);
  } else if (data.type === 'wallet_invoice_result') {
    onWalletInvoiceResult(data);
  } else if (data.type === 'wallet_send_result') {
    onWalletSendResult(data);
  } else if (data.type === 'wallet_history_result') {
    onWalletHistoryResult(data);
  }
  // ptt_started / ptt_stopping / ptt_busy / ptt_idle: harmless, ignore on mobile
}

// One Audio element, reused across replies. iOS is happier this way: the
// element gets unlocked the first time we play through it (during a user
// gesture), and subsequent plays don't need a fresh user gesture.
let replyAudioEl = null;

function playReplyAudio(b64, format) {
  setState('speaking');
  if (!replyAudioEl) {
    replyAudioEl = new Audio();
    replyAudioEl.preload = 'auto';
  }
  // data URL keeps this self-contained — no Blob URLs to revoke.
  replyAudioEl.src = `data:audio/${format};base64,${b64}`;
  replyAudioEl.onended = () => setState('idle');
  replyAudioEl.onerror = (e) => {
    console.error('[chloe] reply audio error', e);
    appendMsg('chloe', '[playback error — see console]', { error: true });
    setState('idle');
  };
  // .play() returns a Promise on modern browsers; failures here usually
  // mean iOS blocked autoplay because we're outside a user gesture.
  // Since playReplyAudio is called from a WS message (not a user tap),
  // iOS *can* refuse — but only the first time. After a single PTT round-
  // trip the audio element is unlocked.
  replyAudioEl.play().catch((e) => {
    console.error('[chloe] play() rejected', e);
    appendMsg('chloe', '[autoplay blocked — tap PTT once and try again]', { error: true });
    setState('idle');
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// CHAT (text)
// ─────────────────────────────────────────────────────────────────────────────
function sendChat() {
  if (busy) return;
  const text = inputEl.value.trim();
  if (!text) return;
  if (!wsReady) {
    appendMsg('chloe', '[error] not connected — is jarvis.py running?', { error: true });
    scheduleReconnect();
    return;
  }
  appendMsg('me', text);
  const userMsg = { role: 'user', content: text };
  const payload = chatHistory.concat([userMsg]);
  chatHistory.push(userMsg);
  trimHistory();
  inputEl.value = '';

  busy = true;
  sendBtn.disabled = true;
  setState('thinking');
  try {
    ws.send(JSON.stringify({
      type: 'chat',
      messages: payload,
      system: CHAT_SYSTEM,
      max_tokens: 1024,
      // reply_audio: tell the backend to synthesize TTS to bytes and
      // broadcast `tts_audio` back over the WS. Without this the chat
      // path falls through to _speak() on PC speakers, which is why
      // earbud users were hearing replies leak through the desktop.
      // The PWA's tts_audio handler (above) plays it locally.
      reply_audio: true,
    }));
  } catch (e) {
    console.error('[chloe] send failed', e);
    busy = false; sendBtn.disabled = false; setState('idle');
    appendMsg('chloe', '[error] send failed: ' + (e.message || e), { error: true });
  }
}
sendBtn.addEventListener('click', sendChat);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

// ─────────────────────────────────────────────────────────────────────────────
// PTT — mic capture via AudioWorklet, encode WAV in JS, send over WS
// ─────────────────────────────────────────────────────────────────────────────
// Why AudioWorklet (and not MediaRecorder)? iOS Safari's MediaRecorder emits
// MP4/AAC, which we'd need ffmpeg to decode server-side. With AudioWorklet we
// pull raw Float32 PCM, convert to mono int16 @ 16kHz here, and ship a WAV
// the stdlib `wave` module can parse without extra deps.

// Inline AudioWorklet processor as a Blob URL so this stays single-file.
const WORKLET_SRC = `
class MicForwarder extends AudioWorkletProcessor {
  process(inputs) {
    const ch0 = inputs[0] && inputs[0][0];
    if (ch0 && ch0.length) {
      // Copy because the buffer is reused by the audio thread
      this.port.postMessage(new Float32Array(ch0));
    }
    return true;
  }
}
registerProcessor('mic-forwarder', MicForwarder);
`;

// Tiny silent WAV used to "unlock" the reply Audio element on iOS — must
// be invoked from a user gesture, after which programmatic .play() calls
// (i.e. when a tts_audio message arrives over the WS) are allowed.
const SILENT_WAV_DATA_URL =
  'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';

function unlockReplyAudio() {
  if (replyAudioEl && replyAudioEl.dataset && replyAudioEl.dataset.unlocked === '1') return;
  if (!replyAudioEl) {
    replyAudioEl = new Audio();
    replyAudioEl.preload = 'auto';
  }
  replyAudioEl.src = SILENT_WAV_DATA_URL;
  // Mute briefly so the silent play is truly silent even on devices with
  // odd codec quirks; we'll restore volume before the real play.
  replyAudioEl.muted = true;
  const p = replyAudioEl.play();
  if (p && p.then) {
    p.then(() => {
      replyAudioEl.muted = false;
      replyAudioEl.dataset.unlocked = '1';
    }).catch(() => {
      replyAudioEl.muted = false;
      // No worries — first PTT reply may still play; iOS sometimes lets
      // through the first programmatic play even without the prime.
    });
  }
}

async function ensureMic() {
  if (micGranted) return true;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl:  true,
      },
      video: false,
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Some browsers start AudioContext suspended until a user gesture
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const blob = new Blob([WORKLET_SRC], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);

    workletNode = new AudioWorkletNode(audioCtx, 'mic-forwarder');
    workletNode.port.onmessage = (ev) => {
      if (recording) pcmBuffer.push(ev.data);
    };
    const src = audioCtx.createMediaStreamSource(micStream);
    src.connect(workletNode);
    // Don't connect to destination — we don't want the mic playing back.

    micGranted = true;
    pttHint.textContent = 'hold to talk';
    return true;
  } catch (e) {
    console.error('[chloe] mic init failed', e);
    pttHint.textContent = 'mic blocked — check site settings';
    appendMsg('chloe', '[error] mic permission denied: ' + (e.message || e), { error: true });
    return false;
  }
}

function downsampleTo16k(float32Frames, srcRate) {
  // Concatenate all collected frames
  const total = float32Frames.reduce((s, f) => s + f.length, 0);
  const flat = new Float32Array(total);
  let off = 0;
  for (const f of float32Frames) { flat.set(f, off); off += f.length; }

  if (srcRate === TARGET_SR) return flat;
  // Linear-interpolation downsample. Speech-quality is fine for Whisper.
  const ratio = srcRate / TARGET_SR;
  const outLen = Math.floor(flat.length / ratio);
  const out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const idx = i * ratio;
    const i0 = Math.floor(idx);
    const i1 = Math.min(i0 + 1, flat.length - 1);
    const frac = idx - i0;
    out[i] = flat[i0] * (1 - frac) + flat[i1] * frac;
  }
  return out;
}

function encodeWav16kMono(float32) {
  // float32 [-1, 1] → int16 PCM → WAV bytes
  const bytesPerSample = 2;
  const dataLen = float32.length * bytesPerSample;
  const buf = new ArrayBuffer(44 + dataLen);
  const dv  = new DataView(buf);

  // RIFF/WAVE header
  let p = 0;
  const w4 = (s) => { for (let i = 0; i < 4; i++) dv.setUint8(p++, s.charCodeAt(i)); };
  const w32 = (n) => { dv.setUint32(p, n, true); p += 4; };
  const w16 = (n) => { dv.setUint16(p, n, true); p += 2; };

  w4('RIFF');
  w32(36 + dataLen);
  w4('WAVE');
  w4('fmt ');
  w32(16);                      // PCM chunk size
  w16(1);                       // PCM format
  w16(1);                       // mono
  w32(TARGET_SR);
  w32(TARGET_SR * bytesPerSample);
  w16(bytesPerSample);          // block align
  w16(16);                      // bits per sample
  w4('data');
  w32(dataLen);

  // Samples
  for (let i = 0; i < float32.length; i++) {
    let s = Math.max(-1, Math.min(1, float32[i]));
    dv.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    p += 2;
  }
  return new Uint8Array(buf);
}

function bytesToBase64(u8) {
  // Chunk to avoid stack overflow from String.fromCharCode(...big array)
  let s = '';
  const CHUNK = 0x8000;
  for (let i = 0; i < u8.length; i += CHUNK) {
    s += String.fromCharCode.apply(null, u8.subarray(i, i + CHUNK));
  }
  return btoa(s);
}

async function startPtt() {
  if (recording) return;
  // Unlock the reply Audio element while we're still inside the user
  // gesture from pointerdown. Cheap; idempotent after the first hold.
  unlockReplyAudio();
  const ok = await ensureMic();
  if (!ok) return;
  if (!wsReady) {
    appendMsg('chloe', '[error] not connected to backend', { error: true });
    return;
  }
  pcmBuffer = [];
  recording = true;
  setState('listening');
  pttBtn.classList.add('holding');
}

function stopPtt() {
  if (!recording) return;
  recording = false;
  pttBtn.classList.remove('holding');
  setState('thinking');

  if (pcmBuffer.length === 0) {
    setState('idle');
    return;
  }

  const sr = audioCtx ? audioCtx.sampleRate : TARGET_SR;
  const float16 = downsampleTo16k(pcmBuffer, sr);
  pcmBuffer = [];

  // Floor-check: very short captures = accidental tap
  if (float16.length < TARGET_SR * 0.25) {
    pttHint.textContent = 'too short — try holding longer';
    setTimeout(() => { pttHint.textContent = 'hold to talk'; }, 2000);
    setState('idle');
    return;
  }

  const wavBytes = encodeWav16kMono(float16);
  const b64 = bytesToBase64(wavBytes);

  try {
    // reply_audio: tell the backend to synthesize TTS and ship the bytes
    // back to us instead of playing on the PC speakers. The phone plays
    // the reply locally (earbud-friendly) — see the tts_audio handler.
    ws.send(JSON.stringify({
      type: 'ptt_audio',
      wav_b64: b64,
      reply_audio: true,
    }));
  } catch (e) {
    console.error('[chloe] ptt_audio send failed', e);
    appendMsg('chloe', '[error] ptt send failed: ' + (e.message || e), { error: true });
    setState('idle');
  }
}

// Pointer events handle both touch (iOS) and mouse cleanly
pttBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startPtt(); });
pttBtn.addEventListener('pointerup',   (e) => { e.preventDefault(); stopPtt();  });
// Cancel = finger slid off the button or browser interrupt
pttBtn.addEventListener('pointercancel', () => stopPtt());
pttBtn.addEventListener('pointerleave',  () => { if (recording) stopPtt(); });

// Spacebar PTT (desktop test convenience)
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat &&
      document.activeElement !== inputEl) {
    e.preventDefault();
    startPtt();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && document.activeElement !== inputEl) {
    e.preventDefault();
    stopPtt();
  }
});

// ─────────────────────────────────────────────────────────────────────────────
// SERVICE WORKER (offline shell)
// ─────────────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('chloe-sw.js').catch(err => {
      console.warn('[chloe] sw register failed:', err);
    });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
setState('idle');
connectWS();
</script>

<!-- ─── 3D GALAXY ORB ────────────────────────────────────────────────────
     Ported from the desktop HUD verbatim — the same shaders, particle
     buffers, postFX (bloom + chroma-scanline), state-driven amplitude
     simulation, and animate() loop. Reads window.__jarvisState (set by
     setState above). Only mobile concession: pauses requestAnimationFrame
     when the page is hidden (battery), and the renderer canvas is sized
     to the .scene container which is 220x220 on a phone.
-->
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }     from 'three/addons/postprocessing/ShaderPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ════════════════════════════════════════════════════════════════════════════
// POSTFX
// ════════════════════════════════════════════════════════════════════════════
const ChromaScanlinePass = {
  uniforms: {
    tDiffuse: { value: null },
    uTime:    { value: 0 },
    uChroma:  { value: 0.0018 },
    uScan:    { value: 0.05 },
    uVignette:{ value: 0.7 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uChroma;
    uniform float uScan;
    uniform float uVignette;
    varying vec2 vUv;
    float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    void main() {
      vec2 uv = vUv;
      vec2 dir = (uv - 0.5);
      float dist = length(dir);
      float ca = uChroma * (0.5 + dist * 1.5);
      vec2 dN = normalize(dir + vec2(0.001));
      float r = texture2D(tDiffuse, uv + dN * ca).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - dN * ca).b;
      vec3 col = vec3(r, g, b);
      float scan = sin(uv.y * 800.0 + uTime * 0.5) * 0.5 + 0.5;
      col *= 1.0 - scan * uScan;
      float noise = hash(vec2(uv.y * 200.0, floor(uTime * 24.0))) * 0.04;
      col += vec3(noise * 0.3, noise * 0.5, noise) * 0.5;
      float vig = smoothstep(0.95, 0.4, dist);
      col *= mix(1.0, vig, uVignette);
      col = mix(col, col * vec3(0.85, 0.95, 1.1), 0.25);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
};

// ════════════════════════════════════════════════════════════════════════════
// GALAXY ORB SHADERS
// ════════════════════════════════════════════════════════════════════════════
const orbVertex = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform float uAmp;
  uniform float uDeform;
  float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }
  float noise(vec3 p) {
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(
      mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
      mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
      f.z);
  }
  void main() {
    vec3 p = position;
    vec3 N = normalize(p);
    float n = noise(N * 2.5 + uTime * 0.4);
    float n2 = noise(N * 5.0 - uTime * 0.6);
    float deform = (n - 0.5) * 0.10 + (n2 - 0.5) * 0.04;
    p += N * (deform * uDeform + uAmp * 0.06);
    vLocalPos = p;
    vec4 worldPos = modelMatrix * vec4(p, 1.0);
    vWorldPos = worldPos.xyz;
    vNormal = normalize(normalMatrix * N);
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const orbFragment = `
  varying vec3 vNormal;
  varying vec3 vWorldPos;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform float uAmp;
  uniform float uTurbulence;
  uniform float uSpiralSpeed;
  uniform vec3  uCoreColor;
  uniform vec3  uMidColor;
  uniform vec3  uEdgeColor;
  uniform float uOpacity;
  float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }
  float noise3(vec3 p) {
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(
      mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
      mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
      f.z);
  }
  float fbm(vec3 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 5; i++) { v += a * noise3(p); p *= 2.05; a *= 0.5; }
    return v;
  }
  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(vViewDir);
    vec3 lp = normalize(vLocalPos);
    float lat = asin(lp.y);
    float lon = atan(lp.z, lp.x);
    float spiral = lon + lat * 3.0 + uTime * uSpiralSpeed;
    vec3 q = vec3(cos(spiral) * 1.6, lat * 1.8, sin(spiral) * 1.6);
    float galaxy = fbm(q + uTime * 0.15);
    float fineDetail = fbm(q * 3.5 - uTime * 0.25);
    float arms = pow(0.5 + 0.5 * sin(spiral * 3.0 + galaxy * 4.0 + uTurbulence * 6.0 * sin(uTime * 0.7)), 2.5);
    float density = arms * (galaxy * 0.7 + fineDetail * 0.3);
    density = pow(density, 1.5);
    density += 0.15 * fineDetail;
    float starField = pow(noise3(lp * 50.0 + uTime * 0.05), 22.0) * 14.0;
    vec3 col = mix(uEdgeColor, uMidColor, density);
    col = mix(col, uCoreColor, pow(density, 2.5));
    col += uCoreColor * starField;
    col *= 1.0 + uAmp * 0.7;
    float fres = pow(1.0 - max(dot(N, V), 0.0), 2.5);
    col += uEdgeColor * fres * 0.9;
    col += uMidColor  * pow(fres, 6.0) * 1.6;
    float pulse = sin(length(vLocalPos) * 18.0 - uTime * 6.0) * 0.5 + 0.5;
    pulse = pow(pulse, 8.0);
    col += uCoreColor * pulse * uAmp * 0.6;
    float scan = sin(vWorldPos.y * 240.0 + uTime * 1.5) * 0.5 + 0.5;
    col += uEdgeColor * pow(scan, 6.0) * 0.04;
    col = col / (1.0 + col * 0.35);
    float alpha = clamp(density * 0.85 + fres * 0.6 + 0.22, 0.0, 1.0) * uOpacity;
    gl_FragColor = vec4(col, alpha);
  }
`;

const shellVertex = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform float uAmp;
  void main() {
    vec3 p = position;
    vec3 N = normalize(p);
    p += N * (sin(uTime * 1.2) * 0.015 + uAmp * 0.10);
    vLocalPos = p;
    vec4 worldPos = modelMatrix * vec4(p, 1.0);
    vNormal = normalize(normalMatrix * N);
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;
const shellFragment = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform float uAmp;
  uniform vec3  uColor;
  float hash(vec3 p) { return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }
  float noise3(vec3 p) {
    vec3 i = floor(p), f = fract(p);
    f = f*f*(3.0-2.0*f);
    return mix(
      mix(mix(hash(i), hash(i+vec3(1,0,0)), f.x), mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
      mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x), mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
      f.z);
  }
  float fbm(vec3 p) {
    float v = 0.0, a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * noise3(p); p *= 2.0; a *= 0.5; }
    return v;
  }
  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(vViewDir);
    float fres = pow(1.0 - max(dot(N, V), 0.0), 2.0);
    float wisp = fbm(vLocalPos * 2.5 + uTime * 0.3);
    wisp = pow(wisp, 1.6);
    vec3 col = uColor * (wisp * 1.2 + fres * 1.5);
    col += uColor * pow(fres, 8.0) * 2.0;
    col *= 1.0 + uAmp * 0.9;
    float alpha = (fres * 0.7 + wisp * 0.4) * (0.55 + uAmp * 0.4);
    gl_FragColor = vec4(col, alpha);
  }
`;

const pulseVertex = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform float uTime;
  uniform float uScale;
  void main() {
    vec3 p = position * uScale;
    vLocalPos = p;
    vec4 worldPos = modelMatrix * vec4(p, 1.0);
    vNormal = normalize(normalMatrix * normalize(position));
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;
const pulseFragment = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vLocalPos;
  uniform vec3 uColor;
  uniform float uOpacity;
  void main() {
    vec3 N = normalize(vNormal);
    vec3 V = normalize(vViewDir);
    float fres = pow(1.0 - max(dot(N, V), 0.0), 2.5);
    fres = pow(fres, 1.5);
    float alpha = fres * uOpacity;
    if (alpha < 0.01) discard;
    gl_FragColor = vec4(uColor * (1.0 + fres * 1.5), alpha);
  }
`;

function buildOrb() {
  const group = new THREE.Group();
  const coreGeo = new THREE.SphereGeometry(0.78, 96, 96);
  const coreUniforms = {
    uTime:         { value: 0 },
    uAmp:          { value: 0 },
    uDeform:       { value: 1.0 },
    uTurbulence:   { value: 0.3 },
    uSpiralSpeed:  { value: 0.15 },
    uCoreColor:    { value: new THREE.Color(0xffe8aa) },
    uMidColor:     { value: new THREE.Color(0x4a9eff) },
    uEdgeColor:    { value: new THREE.Color(0x1a3a66) },
    uOpacity:      { value: 1.0 },
  };
  const coreMat = new THREE.ShaderMaterial({
    vertexShader: orbVertex, fragmentShader: orbFragment,
    transparent: true, side: THREE.FrontSide, depthWrite: false,
    blending: THREE.AdditiveBlending, uniforms: coreUniforms,
  });
  group.add(new THREE.Mesh(coreGeo, coreMat));

  const shellGeo = new THREE.SphereGeometry(0.95, 64, 64);
  const shellUniforms = {
    uTime:  { value: 0 }, uAmp: { value: 0 },
    uColor: { value: new THREE.Color(0x88ccff) },
  };
  const shellMat = new THREE.ShaderMaterial({
    vertexShader: shellVertex, fragmentShader: shellFragment,
    transparent: true, side: THREE.FrontSide, depthWrite: false,
    blending: THREE.AdditiveBlending, uniforms: shellUniforms,
  });
  group.add(new THREE.Mesh(shellGeo, shellMat));

  const pulses = [];
  const pulseGeo = new THREE.SphereGeometry(1.0, 48, 48);
  for (let i = 0; i < 5; i++) {
    const u = {
      uScale:   { value: 1.0 },
      uColor:   { value: new THREE.Color(0xaaddff) },
      uOpacity: { value: 0.0 },
    };
    const m = new THREE.ShaderMaterial({
      vertexShader: pulseVertex, fragmentShader: pulseFragment,
      transparent: true, side: THREE.FrontSide, depthWrite: false,
      blending: THREE.AdditiveBlending, uniforms: u,
    });
    const mesh = new THREE.Mesh(pulseGeo, m);
    mesh.visible = false;
    group.add(mesh);
    pulses.push({ mesh, u, age: -1, life: 0 });
  }

  function makeRing(radius, tubeRadius, color, tilt) {
    const g = new THREE.TorusGeometry(radius, tubeRadius, 16, 128);
    const m = new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const mesh = new THREE.Mesh(g, m);
    mesh.rotation.x = tilt;
    return mesh;
  }
  const ring1 = makeRing(1.10, 0.004, 0x66ccff, Math.PI * 0.42);
  const ring2 = makeRing(1.22, 0.003, 0x99eeff, Math.PI * 0.55);
  const ring3 = makeRing(1.35, 0.002, 0x4488cc, Math.PI * 0.48);
  group.add(ring1); group.add(ring2); group.add(ring3);

  let pulseTimer = 0;
  let nextPulseSpawn = 0;

  return {
    group,
    update({ t, dt, state, amp }) {
      coreUniforms.uTime.value = t;
      coreUniforms.uAmp.value = amp;
      shellUniforms.uTime.value = t;
      shellUniforms.uAmp.value = amp;
      let turb = 0.25, spiral = 0.15, deform = 1.0;
      if (state === 'listening') { turb = 0.15; spiral = 0.08; deform = 0.6; }
      else if (state === 'thinking') { turb = 0.85; spiral = 0.45; deform = 1.4; }
      else if (state === 'speaking') { turb = 0.55; spiral = 0.25; deform = 1.1 + amp * 0.6; }
      coreUniforms.uTurbulence.value += (turb - coreUniforms.uTurbulence.value) * 0.08;
      coreUniforms.uSpiralSpeed.value += (spiral - coreUniforms.uSpiralSpeed.value) * 0.08;
      coreUniforms.uDeform.value += (deform - coreUniforms.uDeform.value) * 0.08;

      const spinMul = state === 'thinking' ? 4.0 : state === 'speaking' ? 2.5 : state === 'listening' ? 0.6 : 1.0;
      ring1.rotation.z += dt * 0.25 * spinMul;
      ring2.rotation.z -= dt * 0.18 * spinMul;
      ring3.rotation.z += dt * 0.32 * spinMul;
      ring1.rotation.y += dt * 0.05 * spinMul;
      ring2.rotation.x += dt * 0.04 * spinMul;

      pulseTimer += dt;
      if (state === 'speaking' && amp > 0.55 && pulseTimer > nextPulseSpawn) {
        for (const p of pulses) {
          if (p.age < 0) {
            p.age = 0; p.life = 1.2; p.mesh.visible = true; break;
          }
        }
        nextPulseSpawn = pulseTimer + 0.18 + Math.random() * 0.12;
      }
      for (const p of pulses) {
        if (p.age >= 0) {
          p.age += dt;
          const k = Math.min(p.age / p.life, 1);
          p.u.uScale.value = 0.95 + k * 1.55;
          p.u.uOpacity.value = (1.0 - k) * 0.7;
          if (p.age >= p.life) { p.age = -1; p.mesh.visible = false; }
        }
      }
    },
  };
}

// ════════════════════════════════════════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════════════════════════════════════════
function buildParticles() {
  const group = new THREE.Group();

  const N1 = 120;
  const inner = new THREE.BufferGeometry();
  const innerPos = new Float32Array(N1 * 3);
  const innerData = new Float32Array(N1 * 4);
  const innerSize = new Float32Array(N1);
  for (let i = 0; i < N1; i++) {
    const r = 1.4 + Math.random() * 1.0;
    const theta0 = Math.random() * Math.PI * 2;
    const phi0 = (Math.random() - 0.5) * 0.6;
    const speed = 0.15 + Math.random() * 0.4;
    innerData.set([r, theta0, phi0, speed], i * 4);
    innerSize[i] = 0.2 + Math.random() * 0.6;
  }
  inner.setAttribute('position', new THREE.BufferAttribute(innerPos, 3));
  inner.setAttribute('aData',    new THREE.BufferAttribute(innerData, 4));
  inner.setAttribute('aSize',    new THREE.BufferAttribute(innerSize, 1));

  const innerMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x88ddff) },
      uPxRatio: { value: window.devicePixelRatio || 1 },
    },
    vertexShader: `
      attribute vec4 aData;
      attribute float aSize;
      uniform float uTime;
      uniform float uPxRatio;
      varying float vAlpha;
      void main() {
        float r = aData.x;
        float theta = aData.y + uTime * aData.w;
        float phi = aData.z + sin(uTime * 0.3 + aData.y) * 0.15;
        vec3 p;
        p.x = r * cos(theta) * cos(phi);
        p.y = r * sin(phi);
        p.z = r * sin(theta) * cos(phi);
        vAlpha = 0.6 + 0.4 * sin(uTime * 2.0 + aData.y * 5.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPxRatio * (180.0 / -mv.z);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float core = smoothstep(0.5, 0.0, d);
        float halo = smoothstep(0.5, 0.1, d);
        vec3 col = uColor * (core * 1.5 + halo * 0.5);
        gl_FragColor = vec4(col, halo * vAlpha);
      }
    `,
  });
  group.add(new THREE.Points(inner, innerMat));

  const N2 = 800;
  const outer = new THREE.BufferGeometry();
  const outerPos = new Float32Array(N2 * 3);
  const outerSize = new Float32Array(N2);
  const outerSeed = new Float32Array(N2);
  for (let i = 0; i < N2; i++) {
    const r = 2.0 + Math.random() * 4.0;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * Math.PI;
    outerPos[i*3]   = r * Math.cos(theta) * Math.cos(phi);
    outerPos[i*3+1] = r * Math.sin(phi);
    outerPos[i*3+2] = r * Math.sin(theta) * Math.cos(phi);
    outerSize[i] = 0.3 + Math.random() * 0.6;
    outerSeed[i] = Math.random() * 100;
  }
  outer.setAttribute('position', new THREE.BufferAttribute(outerPos, 3));
  outer.setAttribute('aSize',    new THREE.BufferAttribute(outerSize, 1));
  outer.setAttribute('aSeed',    new THREE.BufferAttribute(outerSeed, 1));

  const outerMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x4488cc) },
      uPxRatio: { value: window.devicePixelRatio || 1 },
    },
    vertexShader: `
      attribute float aSize;
      attribute float aSeed;
      uniform float uTime;
      uniform float uPxRatio;
      varying float vAlpha;
      void main() {
        vec3 p = position;
        p.x += sin(uTime * 0.15 + aSeed) * 0.08;
        p.y += cos(uTime * 0.12 + aSeed * 1.3) * 0.08;
        p.z += sin(uTime * 0.10 + aSeed * 2.1) * 0.08;
        vAlpha = 0.3 + 0.4 * sin(uTime * 0.5 + aSeed * 3.0);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = aSize * uPxRatio * (160.0 / -mv.z);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float halo = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(uColor * halo, halo * vAlpha * 0.5);
      }
    `,
  });
  group.add(new THREE.Points(outer, outerMat));

  const ringGeo = new THREE.RingGeometry(1.55, 1.62, 128);
  const ringMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x66bbff) },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime; uniform vec3 uColor;
      varying vec2 vUv;
      void main() {
        float a = atan(vUv.y - 0.5, vUv.x - 0.5);
        float dash = step(0.6, sin(a * 60.0 + uTime * 1.5));
        float pulse = step(0.7, sin(a * 6.0 - uTime * 2.0));
        float alpha = (dash * 0.4 + pulse * 0.8);
        gl_FragColor = vec4(uColor * (0.6 + pulse), alpha);
      }
    `,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI * 0.42;
  ring.position.y = -0.05;
  group.add(ring);

  const ring2 = new THREE.Mesh(
    new THREE.RingGeometry(1.95, 1.99, 128),
    ringMat.clone()
  );
  ring2.material.uniforms = {
    uTime: ringMat.uniforms.uTime,
    uColor: { value: new THREE.Color(0x3388cc) },
  };
  ring2.rotation.x = Math.PI * 0.55;
  ring2.rotation.z = Math.PI * 0.3;
  group.add(ring2);

  return {
    group,
    update({ t }) {
      innerMat.uniforms.uTime.value = t;
      outerMat.uniforms.uTime.value = t;
      ringMat.uniforms.uTime.value = t;
      ring.rotation.z = t * 0.05;
      ring2.rotation.y = -t * 0.03;
    },
  };
}

// ════════════════════════════════════════════════════════════════════════════
// SCENE SETUP
// ════════════════════════════════════════════════════════════════════════════
const sceneContainer = document.getElementById('scene');
function getSize() {
  const r = sceneContainer.getBoundingClientRect();
  return { w: r.width || 220, h: r.height || 220 };
}
let { w, h } = getSize();

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(w, h);
renderer.setClearColor(0x000000, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
sceneContainer.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000308, 0.015);

const camera = new THREE.PerspectiveCamera(28, w / h, 0.1, 100);
camera.position.set(0, 0, 5.4);
camera.lookAt(0, 0, 0);

const avatar = new THREE.Group();
scene.add(avatar);

const orb = buildOrb();
avatar.add(orb.group);

const particles = buildParticles();
scene.add(particles.group);

// Halo behind the orb
const haloGeo = new THREE.PlaneGeometry(7, 7);
const haloMat = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 }, uAmp: { value: 0 },
    uColor: { value: new THREE.Color(0x3399ff) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime; uniform vec3 uColor; uniform float uAmp;
    varying vec2 vUv;
    void main() {
      vec2 p = vUv - 0.5;
      float d = length(p);
      float glow = smoothstep(0.5, 0.05, d);
      glow = pow(glow, 2.0);
      float pulse = 0.7 + 0.3 * sin(uTime * 0.7) + uAmp * 0.6;
      gl_FragColor = vec4(uColor * glow * pulse * 0.30, glow * 0.30);
    }
  `,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.z = -1.4;
scene.add(halo);

// Postprocessing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(w, h), 0.55, 0.5, 0.55);
composer.addPass(bloom);
const chromaScan = new ShaderPass(ChromaScanlinePass);
composer.addPass(chromaScan);
composer.addPass(new OutputPass());

// ════════════════════════════════════════════════════════════════════════════
// AMPLITUDE SIMULATION — drives orb visuals based on current state
// ════════════════════════════════════════════════════════════════════════════
function hashN(n) { return Math.abs(Math.sin(n * 12.9898) * 43758.5453) % 1; }
function pnoise(t) {
  const i = Math.floor(t), f = t - i;
  const a = hashN(i), b = hashN(i + 1);
  const u = f * f * (3 - 2 * f);
  return a * (1 - u) + b * u;
}
let amp = 0;
let speakSyllable = 0, nextSyllable = 0;
function updateAmp(t, dt, state) {
  let target = 0;
  if (state === 'idle') {
    target = 0.10 + Math.sin(t * 0.9) * 0.05 + pnoise(t * 0.6) * 0.06;
  } else if (state === 'listening') {
    target = 0.20 + pnoise(t * 1.2) * 0.35 + pnoise(t * 3.7) * 0.12;
  } else if (state === 'thinking') {
    target = 0.35 + pnoise(t * 2.3) * 0.25 + pnoise(t * 5.1) * 0.10;
  } else if (state === 'speaking') {
    speakSyllable -= dt;
    if (speakSyllable <= 0) {
      nextSyllable = 0.85 + Math.random() * 0.5;
      speakSyllable = 0.08 + Math.random() * 0.20;
    }
    const env = Math.max(0, Math.sin((1 - speakSyllable / 0.28) * Math.PI));
    target = 0.20 + env * nextSyllable + pnoise(t * 8) * 0.08;
  }
  amp += (target - amp) * 0.18;
  amp = Math.max(0, Math.min(1, amp));
}

// ════════════════════════════════════════════════════════════════════════════
// ANIMATE — paused while the page is hidden (battery on mobile)
// ════════════════════════════════════════════════════════════════════════════
const clock = new THREE.Clock();
let running = true;

function animate() {
  if (!running) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.getElapsedTime();
  const state = window.__jarvisState || 'idle';
  updateAmp(t, dt, state);

  const baseSpin = state === 'thinking' ? 0.35 : state === 'speaking' ? 0.15 : 0.08;
  avatar.rotation.y += dt * baseSpin;

  const breathe = 1.0 + amp * 0.04;
  avatar.scale.setScalar(breathe);

  orb.update({ t, dt, state, amp });
  particles.update({ t, dt, state, amp });

  haloMat.uniforms.uTime.value = t;
  haloMat.uniforms.uAmp.value  = amp;
  chromaScan.uniforms.uTime.value = t;

  composer.render();
  requestAnimationFrame(animate);
}

// Hide the loader on first frame
requestAnimationFrame(() => {
  const l = document.getElementById('orb-loader');
  if (l) {
    l.classList.add('hidden');
    setTimeout(() => l.remove(), 600);
  }
  animate();
});

// Resize observer — keep orb sized to the .scene container if it ever
// changes (e.g. iPhone rotation, dynamic Type changes, etc.)
const ro = new ResizeObserver(() => {
  const s = getSize();
  if (s.w === 0 || s.h === 0) return;
  renderer.setSize(s.w, s.h);
  composer.setSize(s.w, s.h);
  bloom.setSize(s.w, s.h);
  camera.aspect = s.w / s.h;
  camera.updateProjectionMatrix();
});
ro.observe(sceneContainer);

// Pause the render loop while the tab/PWA is backgrounded — saves a lot
// of phone battery on a tile that's redrawing 60 times a second.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    running = false;
  } else if (!running) {
    running = true;
    clock.getDelta(); // reset so we don't burn an old long delta
    requestAnimationFrame(animate);
  }
});
</script>

<!-- Wallet UI must be in a REGULAR (non-module) script so its top-level
     functions land on the global scope where handleStructured (in the
     first inline script) can call them via onWalletBalanceResult etc. -->
<script>
// ─────────────────────────────────────────────────────────────────────────────
// WALLET PANE — opens a full-screen sheet over the chat. All transactions
// go through the WS to the Python backend, which gates send via PIN+cap
// in wallet_guard.py. Each receive call generates a fresh BOLT11 — never
// reuse an invoice, that's the point of regenerating per transaction.
// ─────────────────────────────────────────────────────────────────────────────
const walletSheet     = document.getElementById('wallet-sheet');
const walletOpenBtn   = document.getElementById('wallet-open-btn');
const walletCloseBtn  = document.getElementById('wallet-close-btn');
const walletRefreshBtn= document.getElementById('wallet-refresh-btn');
const walletReceiveBtn= document.getElementById('wallet-receive-btn');
const walletSendBtn   = document.getElementById('wallet-send-btn');
const balanceValueEl  = document.getElementById('wallet-balance-value');
const balancePendEl   = document.getElementById('wallet-pending');
const historyListEl   = document.getElementById('wallet-history-list');

const receiveModal      = document.getElementById('receive-modal');
const receiveStepAmount = document.getElementById('receive-step-amount');
const receiveStepResult = document.getElementById('receive-step-result');
const receiveAmountEl   = document.getElementById('receive-amount');
const receiveMemoEl     = document.getElementById('receive-memo');
const receiveStatusEl   = document.getElementById('receive-status');
const receiveQrEl       = document.getElementById('receive-qr');
const receiveBolt11El   = document.getElementById('receive-bolt11');
const receiveResultStatusEl = document.getElementById('receive-result-status');

const sendModal       = document.getElementById('send-modal');
const sendDestEl      = document.getElementById('send-destination');
const sendAmountEl    = document.getElementById('send-amount');
const sendPinEl       = document.getElementById('send-pin');
const sendStatusEl    = document.getElementById('send-status');

let lastInvoice = '';

function wsSendObj(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
    return true;
  }
  return false;
}

function openWallet() {
  walletSheet.classList.add('active');
  refreshBalance();
  refreshHistory();
}

function closeWallet() {
  walletSheet.classList.remove('active');
}

function refreshBalance() {
  balanceValueEl.textContent = '…';
  balancePendEl.textContent  = '';
  if (!wsSendObj({ type: 'wallet_balance' })) {
    balanceValueEl.textContent = '—';
    balancePendEl.textContent  = 'offline';
  }
}

function refreshHistory() {
  if (!wsSendObj({ type: 'wallet_history', limit: 10 })) return;
}

function onWalletBalanceResult(data) {
  if (!data.ok) {
    balanceValueEl.textContent = '—';
    balancePendEl.textContent  = data.error || 'error';
    return;
  }
  balanceValueEl.textContent = (data.balance_sat || 0).toLocaleString();
  const pendIn  = data.pending_receive_sat || 0;
  const pendOut = data.pending_send_sat || 0;
  if (pendIn || pendOut) {
    const parts = [];
    if (pendIn)  parts.push('+' + pendIn.toLocaleString() + ' incoming');
    if (pendOut) parts.push('-' + pendOut.toLocaleString() + ' outgoing');
    balancePendEl.textContent = parts.join(' · ');
  } else {
    balancePendEl.textContent = '';
  }
}

function onWalletHistoryResult(data) {
  if (!data.ok) {
    historyListEl.innerHTML =
      '<div class="history-empty">' + (data.error || 'history unavailable') + '</div>';
    return;
  }
  const payments = data.payments || [];
  if (!payments.length) {
    historyListEl.innerHTML = '<div class="history-empty">no payments yet</div>';
    return;
  }
  historyListEl.innerHTML = payments.map(p => {
    const dir   = (p.type || '').toLowerCase().includes('receive') ? 'in' : 'out';
    const sign  = dir === 'in' ? '+' : '-';
    const sats  = (p.amount_sat || 0).toLocaleString();
    const desc  = (p.description || '').slice(0, 32) || '(no memo)';
    const status= p.status ? p.status.toLowerCase() : '';
    const ts    = p.timestamp ? new Date(p.timestamp * 1000).toLocaleString() : '';
    return (
      '<div class="history-row">' +
        '<div>' +
          '<div>' + escapeHtml(desc) + '</div>' +
          '<div class="history-meta">' + escapeHtml(ts) + ' · ' + escapeHtml(status) + '</div>' +
        '</div>' +
        '<div class="history-amt ' + dir + '">' + sign + sats + ' sat</div>' +
      '</div>'
    );
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ── RECEIVE FLOW ────────────────────────────────────────────────────────────
function openReceive() {
  receiveStepAmount.style.display = '';
  receiveStepResult.style.display = 'none';
  receiveAmountEl.value = '';
  receiveMemoEl.value   = '';
  receiveStatusEl.textContent = '';
  receiveStatusEl.className = 'modal-status';
  receiveModal.classList.add('active');
  setTimeout(() => receiveAmountEl.focus(), 50);
}

function closeReceive() {
  receiveModal.classList.remove('active');
}

function generateInvoice() {
  const amount = parseInt(receiveAmountEl.value, 10);
  if (!amount || amount < 1) {
    receiveStatusEl.textContent = 'Enter a positive amount.';
    receiveStatusEl.className = 'modal-status error';
    return;
  }
  receiveStatusEl.textContent = 'requesting invoice…';
  receiveStatusEl.className = 'modal-status';
  if (!wsSendObj({
    type: 'wallet_create_invoice',
    amount_sat: amount,
    memo: receiveMemoEl.value || ''
  })) {
    receiveStatusEl.textContent = 'WS offline.';
    receiveStatusEl.className = 'modal-status error';
  }
}

function onWalletInvoiceResult(data) {
  if (!receiveModal.classList.contains('active')) return; // not us
  if (!data.ok) {
    receiveStatusEl.textContent = data.error || 'invoice failed';
    receiveStatusEl.className = 'modal-status error';
    return;
  }
  lastInvoice = data.bolt11 || '';
  receiveBolt11El.textContent = lastInvoice;
  // QR — qrcode-generator picks the smallest fitting type. Type 0 = auto.
  // ECC level 'L' (low) is fine for short-lived invoices and yields the
  // densest QR; payment apps decode it readily.
  // Use positional args (cellSize, margin) — the object-arg form silently
  // produces a 1x1 QR in qrcode-generator@1.4.x.
  try {
    const qr = qrcode(0, 'L');
    qr.addData(lastInvoice.toUpperCase());  // alphanumeric mode is denser; bolt11 is case-insensitive
    qr.make();
    receiveQrEl.innerHTML = qr.createSvgTag(5, 4);
    // Force the SVG to fill its container nicely on any screen size.
    const svg = receiveQrEl.querySelector('svg');
    if (svg) {
      svg.setAttribute('width',  '240');
      svg.setAttribute('height', '240');
      svg.style.display = 'block';
    }
  } catch (e) {
    // Fallback: alphanumeric mode rejects some chars; retry as bytes.
    try {
      const qr = qrcode(0, 'L');
      qr.addData(lastInvoice);
      qr.make();
      receiveQrEl.innerHTML = qr.createSvgTag(5, 4);
      const svg = receiveQrEl.querySelector('svg');
      if (svg) { svg.setAttribute('width','240'); svg.setAttribute('height','240'); svg.style.display='block'; }
    } catch (e2) {
      receiveQrEl.innerHTML = '<div style="color:#000;padding:24px;">' +
        'QR render failed: ' + e2.message + '</div>';
    }
  }
  receiveResultStatusEl.textContent =
    'Invoice for ' + (data.amount_sat || 0).toLocaleString() + ' sat ready. ' +
    'Network fee est. ' + (data.fees_sat || 0).toLocaleString() + ' sat.';
  receiveResultStatusEl.className = 'modal-status ok';
  receiveStepAmount.style.display = 'none';
  receiveStepResult.style.display = '';
}

async function copyInvoice() {
  if (!lastInvoice) return;
  try {
    await navigator.clipboard.writeText(lastInvoice);
    receiveResultStatusEl.textContent = 'copied to clipboard';
    receiveResultStatusEl.className = 'modal-status ok';
  } catch (e) {
    receiveResultStatusEl.textContent = 'clipboard blocked: long-press the bolt11 field above to select+copy manually';
    receiveResultStatusEl.className = 'modal-status error';
  }
}

// ── SEND FLOW ───────────────────────────────────────────────────────────────
function openSend() {
  sendDestEl.value   = '';
  sendAmountEl.value = '';
  sendPinEl.value    = '';
  sendStatusEl.textContent = '';
  sendStatusEl.className = 'modal-status';
  document.getElementById('send-confirm-btn').disabled = false;
  sendModal.classList.add('active');
  setTimeout(() => sendDestEl.focus(), 50);
}

function closeSend() {
  sendModal.classList.remove('active');
}

function confirmSend() {
  const dest   = (sendDestEl.value || '').trim();
  const amount = parseInt(sendAmountEl.value, 10);
  const pin    = sendPinEl.value || '';
  if (!dest) {
    sendStatusEl.textContent = 'Destination required.';
    sendStatusEl.className = 'modal-status error';
    return;
  }
  if (!pin) {
    sendStatusEl.textContent = 'PIN required.';
    sendStatusEl.className = 'modal-status error';
    return;
  }
  sendStatusEl.textContent = 'sending…';
  sendStatusEl.className = 'modal-status';
  document.getElementById('send-confirm-btn').disabled = true;
  const payload = { type: 'wallet_send', destination: dest, pin };
  if (Number.isFinite(amount) && amount > 0) payload.amount_sat = amount;
  if (!wsSendObj(payload)) {
    sendStatusEl.textContent = 'WS offline.';
    sendStatusEl.className = 'modal-status error';
    document.getElementById('send-confirm-btn').disabled = false;
  }
  // Wipe the PIN from the DOM the moment we've sent it. The browser-side
  // value is gone — even if the page hangs, no PIN is sitting in memory.
  sendPinEl.value = '';
}

function onWalletSendResult(data) {
  if (!sendModal.classList.contains('active')) return;
  document.getElementById('send-confirm-btn').disabled = false;
  if (!data.ok) {
    sendStatusEl.textContent = data.error || 'send failed';
    sendStatusEl.className = 'modal-status error';
    return;
  }
  sendStatusEl.textContent =
    'Sent ' + (data.amount_sat || 0).toLocaleString() + ' sat ' +
    '(fee ' + (data.fees_sat || 0).toLocaleString() + '). ' +
    (data.status || '');
  sendStatusEl.className = 'modal-status ok';
  // Refresh balance + history in the background after a successful send.
  setTimeout(() => { refreshBalance(); refreshHistory(); }, 500);
}

// ── WIRE UP ─────────────────────────────────────────────────────────────────
walletOpenBtn.addEventListener('click',    openWallet);
walletCloseBtn.addEventListener('click',   closeWallet);
walletRefreshBtn.addEventListener('click', () => { refreshBalance(); refreshHistory(); });
walletReceiveBtn.addEventListener('click', openReceive);
walletSendBtn.addEventListener('click',    openSend);

document.getElementById('receive-cancel-btn').addEventListener('click',   closeReceive);
document.getElementById('receive-done-btn').addEventListener('click',     closeReceive);
document.getElementById('receive-generate-btn').addEventListener('click', generateInvoice);
document.getElementById('receive-new-btn').addEventListener('click',      openReceive);
document.getElementById('receive-copy-btn').addEventListener('click',     copyInvoice);

document.getElementById('send-cancel-btn').addEventListener('click',  closeSend);
document.getElementById('send-confirm-btn').addEventListener('click', confirmSend);

// Backdrop tap closes (but only on the backdrop, not the modal contents)
[receiveModal, sendModal].forEach(m => {
  m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('active'); });
});
</script>
